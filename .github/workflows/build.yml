name: build_stunning_waddle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]

    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout_repository
        uses: actions/checkout@v4

      - name: install_linux_dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: install_dependencies_macos
        if: matrix.os == 'macos-15'
        run: |
          xcode-select -p

      - name: configure_cmake
        run: |
          cmake -S . -B build -DBUILD_TESTING=ON

      - name: build_project
        run: |
          cmake --build build

      - name: run_tests
        run: |
          cd build
          ctest -V
